<!DOCTYPE html>
<html>
<head>
  <title>Welcome to AWS Cloud Server</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      background: rgba(255, 255, 255, 0.12);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      max-width: 700px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 15px;
    }

    h2 {
      font-size: 28px;
      color: #facc15;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
    }

    .tag {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 24px;
      background: #22c55e;
      color: #fff;
      border-radius: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Welcome to AWS Cloud</h1>
    <h2>Server Launched Successfully</h2>
    <p>
      This web page is hosted on an AWS EC2 instance.<br>
      VPC, Subnet, Security Group, and Web Server are configured successfully.
    </p>
    <div class="tag">AWS CLI Deployment Successful</div>
  </div>

</body>
</html>
